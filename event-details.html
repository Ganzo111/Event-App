<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="static/style/style.css">

  <title>EventHub</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand">EventHub</a>
    <div>
      <a href="create-event.html" class="btn btn-success">Create</a>
      <a href="booking-history.html" class="btn btn-light">Bookings</a>
    </div>
  </div>
</nav>


<!-- EVENT DETAILS -->
<div class="container mt-4">
  <div class="row">

    <div class="col-md-6">
      <img src="https://picsum.photos/600/300" class="img-fluid rounded">
    </div>

    <div class="col-md-6">
      <h2>Music Festival</h2>
      <p>Date: 20 May</p>
      <p>Location: Brisbane</p>
      <p>Amazing live music event.</p>

      <input type="number" class="form-control mb-2" placeholder="Number of tickets">
      <button class="btn btn-success w-100">Book Now</button>
    </div>

  </div>

  <!-- COMMENTS -->
  <div class="mt-5">
    <h4>Comments</h4>

    <div class="card mb-2">
      <div class="card-body">
        <strong>John:</strong> Looks awesome!
      </div>
    </div>

    <textarea class="form-control mt-3" placeholder="Write a comment"></textarea>
    <button class="btn btn-primary mt-2">Post Comment</button>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
