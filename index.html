<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->

  <!-- Your CSS -->
  <link rel="stylesheet" href="static/style/style.css">

  <title>EventHub</title>
</head>

<body>

<!-- NAVBAR (only ONE) -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand">EventHub</a>

    <div>
      <a href="create-event.html" class="btn btn-success">Create</a>
      <a href="booking-history.html" class="btn btn-light">Bookings</a>
      <a href="login.html" class="btn btn-outline-light">Login</a>
    </div>
  </div>
</nav>

<!-- HERO IMAGE -->
<!-- HERO SECTION -->
<div class="container-fluid p-0">
  <div class="hero-banner d-flex align-items-center">
    <div class="container text-white">
      
      <p class="badge bg-light text-dark mb-2">GET INTO IT</p>

      <h1 class="display-5 fw-bold">
        FROM POP BALLADS <br>
        TO EMO ENCORES
      </h1>

      <a href="#" class="btn btn-light mt-3 px-4 py-2 rounded-pill">
        Get Into Live Music
      </a>

    </div>
  </div>
</div>

<!-- EVENTS -->
<div class="container mt-4">
  <h2 class="mb-4">Upcoming Events</h2>

  <div class="row">

    <!-- CARD 1 -->
    <div class="col-md-4 mb-4">
      <div class="card event-card">
        <img src="https://picsum.photos/400/200" class="card-img-top">

        <div class="card-body">
          <h5>Music Festival</h5>
          <p>Brisbane • May 20</p>
          <span class="badge bg-success">Open</span>

          <a href="event-details.html" class="btn btn-primary w-100 mt-2">View</a>
        </div>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="col-md-4 mb-4">
      <div class="card event-card">
        <img src="https://picsum.photos/401/200" class="card-img-top">

        <div class="card-body">
          <h5>Tech Meetup</h5>
          <p>Gold Coast • June 10</p>
          <span class="badge bg-danger">Sold Out</span>

          <a href="event-details.html" class="btn btn-primary w-100 mt-2">View</a>
        </div>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="col-md-4 mb-4">
      <div class="card event-card">
        <img src="https://picsum.photos/401/201" class="card-img-top">

        <div class="card-body">
          <h5>Rock Concert</h5>
          <p>Gold Coast • June 10</p>
          <span class="badge bg-danger">Sold Out</span>

          <a href="event-details.html" class="btn btn-primary w-100 mt-2">View</a>
        </div>
      </div>
    </div>

  </div>
</div>
