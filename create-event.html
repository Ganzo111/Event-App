<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="static/style/style.css">

  <title>EventHub</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">EventHub</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <form class="d-flex mx-auto my-3 my-lg-0 search-form">
          <input
            class="form-control me-2"
            type="search"
            placeholder="Search events"
            aria-label="Search"
          />
          <button class="btn btn-outline-primary" type="submit">Search</button>
        </form>

        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item">
            <a class="nav-link" href="create-event.html">Create Event</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-outline-secondary" href="login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary" href="login.html">Sign Up</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

<div class="container mt-4">
  <h2>Create Event</h2>

  <form>
    <input class="form-control mb-3" placeholder="Event Name">

    <input type="date" class="form-control mb-3">

    <textarea class="form-control mb-3" placeholder="Description"></textarea>

    <select class="form-select mb-3">
      <option>Select Category</option>
      <option>Music</option>
      <option>Tech</option>
    </select>

    <select class="form-select mb-3">
        <option>No Acknowledgement</option>
        <option>Generic Acknowledgement</option>
        <option>Enhanced Acknowledgement</option>
    </select>

    <input type="number" class="form-control mb-3" placeholder="Tickets Available">

    <button class="btn btn-success w-100" onclick="alert('Event Created!')">
    Create Event
    </button>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
