<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="static/style/style.css">

  <title>EventHub</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand">EventHub</a>
    <div>
      <a href="create-event.html" class="btn btn-success">Create</a>
      <a href="booking-history.html" class="btn btn-light">Bookings</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Create Event</h2>

  <form>
    <input class="form-control mb-3" placeholder="Event Name">

    <input type="date" class="form-control mb-3">

    <textarea class="form-control mb-3" placeholder="Description"></textarea>

    <select class="form-select mb-3">
      <option>Select Category</option>
      <option>Music</option>
      <option>Tech</option>
    </select>

    <select class="form-select mb-3">
        <option>No Acknowledgement</option>
        <option>Generic Acknowledgement</option>
        <option>Enhanced Acknowledgement</option>
    </select>

    <input type="number" class="form-control mb-3" placeholder="Tickets Available">

    <button class="btn btn-success w-100" onclick="alert('Event Created!')">
    Create Event
    </button>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
